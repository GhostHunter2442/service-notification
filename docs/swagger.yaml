basePath: /
definitions:
  domain.ErrorType:
    enum:
    - 0
    - 1
    type: integer
    x-enum-comments:
      ErrorPermanent: เบอร์ผิด/token invalid -> ไม่ต้อง retry
      ErrorTemporary: network/timeout/rate limit -> retry
    x-enum-descriptions:
    - network/timeout/rate limit -> retry
    - เบอร์ผิด/token invalid -> ไม่ต้อง retry
    x-enum-varnames:
    - ErrorTemporary
    - ErrorPermanent
  domain.Result:
    properties:
      err:
        allOf:
        - $ref: '#/definitions/domain.SendError'
        description: nil = สำเร็จ
      notificationID:
        type: string
      providerMessageID:
        description: id ที่ provider คืนมา (เก็บไว้ map DLR)
        type: string
    type: object
  domain.SendError:
    properties:
      code:
        type: string
      message:
        type: string
      type:
        $ref: '#/definitions/domain.ErrorType'
    type: object
  handler.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  handler.HealthResponse:
    properties:
      env:
        example: local
        type: string
      status:
        example: ok
        type: string
    type: object
  handler.TestSendRequest:
    properties:
      body:
        example: ทดสอบส่ง
        type: string
      recipient:
        example: "0861234567"
        type: string
    required:
    - body
    - recipient
    type: object
  handler.TestSendResponse:
    properties:
      channel:
        example: sms
        type: string
      results:
        items:
          $ref: '#/definitions/domain.Result'
        type: array
    type: object
host: localhost:8080
info:
  contact: {}
  description: API สำหรับส่ง SMS / FCM / Email notification (RabbitMQ + Azure SQL)
  title: Service Notification API
  version: "1.0"
paths:
  /health:
    get:
      description: เช็คว่า service พร้อมทำงาน
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HealthResponse'
      summary: Health check
      tags:
      - system
  /test-send:
    post:
      consumes:
      - application/json
      description: demo ชั่วคราว — พิสูจน์ว่า Sender interface ทำงาน (ยังไม่ผ่าน DB/queue)
      parameters:
      - description: payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.TestSendRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.TestSendResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: ทดสอบส่งผ่าน mock sender
      tags:
      - notifications
swagger: "2.0"
